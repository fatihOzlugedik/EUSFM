# EUS MAE pretraining initialised from DINOv3 ViT-L checkpoint (DAPT).
# Backbone starts from pretrained weights; lightweight decoder is randomly initialised.
# Lower LR and shorter warmup for domain-adaptive pretraining.
MODEL:
  META_ARCHITECTURE: MAEMetaArch
train:
  dataset_path: EUS:split=TRAIN:root=/data/eus
  OFFICIAL_EPOCH_LENGTH: 3907
student:
  norm_layer: layernormbf16
  n_storage_tokens: 4
  mask_k_bias: true
  pos_embed_rope_rescale_coords: 2
  resume_from_teacher_chkpt: ""  # set to output of prepare_dinov3_checkpoint.py
ibot:
  mask_sample_probability: 1.0
  mask_ratio_min_max:
  - 0.5
  - 0.75
crops:
  global_crops_scale:
  - 0.2
  - 1.0
  local_crops_number: 0
  horizontal_flips: false
optim:
  lr: 0.00005
  warmup_epochs: 5

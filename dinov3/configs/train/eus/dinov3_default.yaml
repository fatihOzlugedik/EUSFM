# DINOv3 default augmentation setup — no EUS modifications.
# Use this as the control baseline when comparing against the EUS ablation configs.
# All values are the original DINOv3 defaults, explicitly stated for clarity.
crops:
  global_crops_scale:
  - 0.32
  - 1.0
  local_crops_scale:
  - 0.05
  - 0.32
  horizontal_flips: true
  min_content_mean: 0.0
  depth_attenuation_p: 0.0
  gaussian_shadow_p: 0.0
  color_jitter_brightness: 0.4
  color_jitter_contrast: 0.4
  color_jitter_saturation: 0.2
  color_jitter_hue: 0.1
  color_jitter_prob: 0.8
  random_grayscale_prob: 0.2
  solarize_prob: 0.2

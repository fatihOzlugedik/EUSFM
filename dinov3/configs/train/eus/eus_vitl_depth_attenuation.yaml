# EUS ablation: depth attenuation only.
# Adds physics-based exponential signal-decay with tissue depth on top of the EUS baseline.
# Applied with probability 0.5; alpha sampled from [0.01, 0.05].
# Simulates variable acoustic attenuation (e.g. in obese patients or dense tissue).
train:
  dataset_path: EUS:split=TRAIN:root=/data/eus
  OFFICIAL_EPOCH_LENGTH: 3907
student:
  norm_layer: layernormbf16
  n_storage_tokens: 4
  mask_k_bias: true
  pos_embed_rope_rescale_coords: 2
  resume_from_teacher_chkpt: ""  # set to output of prepare_dinov3_checkpoint.py
crops:
  global_crops_scale:
  - 0.5
  - 1.0
  local_crops_scale:
  - 0.1
  - 0.5
  horizontal_flips: false
  color_jitter_brightness: 0.2
  color_jitter_contrast: 0.2
  color_jitter_saturation: 0.0
  color_jitter_hue: 0.0
  color_jitter_prob: 0.8
  random_grayscale_prob: 0.0
  solarize_prob: 0.0
  depth_attenuation_p: 0.5
  depth_attenuation_alpha_min: 0.01
  depth_attenuation_alpha_max: 0.05
